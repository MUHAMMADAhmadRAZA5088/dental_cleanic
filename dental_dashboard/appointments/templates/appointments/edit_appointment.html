{% extends "appointments/base.html" %}
{% block content %}
<div class="form-box">
    <h2>Edit / Reschedule Appointment</h2>
    <form method="POST">
        {% csrf_token %}
        <label>Patient Name</label>
        <input type="text" name="name" value="{{ appointment.name }}" required>

        <label>Phone Number</label>
        <input type="text" name="phone" value="{{ appointment.phone }}" required>

        <label>Location</label>
        <select name="location">
            <option value="Jackson Heights" {% if appointment.location == "Jackson Heights" %}selected{% endif %}>Jackson Heights - 8202 Roosevelt Ave</option>
            <option value="Woodside" {% if appointment.location == "Woodside" %}selected{% endif %}>Woodside - 39-72 61st St</option>
        </select>

        <label>Service</label>
        <input type="text" name="service" value="{{ appointment.service }}" required>

        <label>Date</label>
        <input type="date" name="date" value="{{ appointment.date|date:'Y-m-d' }}" required>

        <label>Time</label>
        <input type="time" name="time" value="{{ appointment.time|time:'H:i' }}" required>

        <label>Status</label>
        <select name="status">
            {% for value, label in appointment.STATUS_CHOICES %}
            <option value="{{ value }}" {% if appointment.status == value %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
        </select>

        <label>Notes</label>
        <textarea name="notes" rows="3">{{ appointment.notes }}</textarea>

        <button type="submit" class="btn btn-primary">Update Appointment</button>
        <a href="{% url 'dashboard' %}" class="btn" style="background:#9ca3af; color:#fff;">Cancel</a>
    </form>
</div>
{% endblock %}
